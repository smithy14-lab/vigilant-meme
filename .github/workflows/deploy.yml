name: Build and Deploy CheerDeck

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'

permissions:
  id-token: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore CheerDeck.slnx

      - name: Build
        run: dotnet build CheerDeck.slnx --no-restore -c Release

      - name: Test
        run: dotnet test CheerDeck.slnx --no-build -c Release --verbosity normal

      - name: Publish API
        run: dotnet publish src/CheerDeck.Api/CheerDeck.Api.csproj -c Release -o publish/api

      - name: Publish Club
        run: dotnet publish src/CheerDeck.Club.Web/CheerDeck.Club.Web.csproj -c Release -o publish/club

      - name: Publish Competition
        run: dotnet publish src/CheerDeck.Competition.Web/CheerDeck.Competition.Web.csproj -c Release -o publish/competition

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: publish/api

      - name: Upload Club artifact
        uses: actions/upload-artifact@v4
        with:
          name: club
          path: publish/club

      - name: Upload Competition artifact
        uses: actions/upload-artifact@v4
        with:
          name: competition
          path: publish/competition

  deploy-api:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: api

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: cheerdeck-api
          package: api

  deploy-club:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: club
          path: club

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: cheerdeck-club
          package: club

  deploy-competition:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: competition
          path: competition

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure
        uses: azure/webapps-deploy@v3
        with:
          app-name: cheerdeck-competition
          package: competition
