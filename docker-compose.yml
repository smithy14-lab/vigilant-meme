services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cheerdeck-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "CheerDeck_Dev#2024"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - cheerdeck-network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "CheerDeck_Dev#2024" -C -Q "SELECT 1" -b -o /dev/null
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  cheerdeck-api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cheerdeck-api
    ports:
      - "5100:5100"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5100
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CheerDeck;User Id=sa;Password=CheerDeck_Dev#2024;TrustServerCertificate=True"
      UseInMemoryDatabase: "false"
      Stripe__SecretKey: ""
      Stripe__PublishableKey: ""
      Stripe__WebhookSecret: ""
      SendGrid__ApiKey: ""
      SendGrid__FromEmail: "noreply@cheerdeck.com"
      SendGrid__FromName: "CheerDeck"
      Cors__AllowedOrigins__0: "http://localhost:5200"
      Cors__AllowedOrigins__1: "http://localhost:5300"
    depends_on:
      sqlserver:
        condition: service_healthy
    networks:
      - cheerdeck-network

  cheerdeck-club-web:
    build:
      context: .
      dockerfile: Dockerfile.club
    container_name: cheerdeck-club-web
    ports:
      - "5200:5200"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5200
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CheerDeck;User Id=sa;Password=CheerDeck_Dev#2024;TrustServerCertificate=True"
      UseInMemoryDatabase: "false"
      Stripe__SecretKey: ""
      Stripe__PublishableKey: ""
      Stripe__WebhookSecret: ""
      SendGrid__ApiKey: ""
      SendGrid__FromEmail: "noreply@cheerdeck.com"
      SendGrid__FromName: "CheerDeck"
    depends_on:
      sqlserver:
        condition: service_healthy
      cheerdeck-api:
        condition: service_started
    networks:
      - cheerdeck-network

  cheerdeck-competition-web:
    build:
      context: .
      dockerfile: Dockerfile.competition
    container_name: cheerdeck-competition-web
    ports:
      - "5300:5300"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5300
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=CheerDeck;User Id=sa;Password=CheerDeck_Dev#2024;TrustServerCertificate=True"
      UseInMemoryDatabase: "false"
      Stripe__SecretKey: ""
      Stripe__PublishableKey: ""
      Stripe__WebhookSecret: ""
      SendGrid__ApiKey: ""
      SendGrid__FromEmail: "noreply@cheerdeck.com"
      SendGrid__FromName: "CheerDeck"
    depends_on:
      sqlserver:
        condition: service_healthy
      cheerdeck-api:
        condition: service_started
    networks:
      - cheerdeck-network

volumes:
  sqlserver-data:

networks:
  cheerdeck-network:
    driver: bridge
